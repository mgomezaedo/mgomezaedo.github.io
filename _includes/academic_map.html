<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  #academic-map { height: 420px; width: 100%; border-radius: 8px; margin: 0.5rem 0; border: 1px solid #444; }
  .map-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #333; }
  .map-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; font-size: 0.85rem; }
  .map-legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid #fff; box-shadow: 0 0 3px rgba(0,0,0,0.3); }
  .zoom-btn { padding: 5px 14px; border-radius: 4px; border: 1px solid #555; background: transparent; color: #ccc; font-size: 13px; cursor: pointer; }
  .zoom-btn.active { background: #333; border-color: #888; color: #fff; font-weight: 600; }
</style>

<div class="map-section">

<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
  <button class="zoom-btn active" id="btn-all" onclick="zoomTo('all')">All</button>
  <button class="zoom-btn" id="btn-europe" onclick="zoomTo('europe')">Europe</button>
  <button class="zoom-btn" id="btn-sa" onclick="zoomTo('sa')">South America</button>
  <button class="zoom-btn" id="btn-santiago" onclick="zoomTo('santiago')">Santiago</button>
  <button class="zoom-btn" id="btn-barcelona" onclick="zoomTo('barcelona')">Barcelona</button>
  <button class="zoom-btn" id="btn-london" onclick="zoomTo('london')">London</button>
</div>

<div class="map-legend">
  <div class="map-legend-item"><span class="legend-dot" style="background:#2563eb;"></span> University / research centre</div>
  <div class="map-legend-item"><span class="legend-dot" style="background:#dc2626;"></span> Conference talk</div>
  <div class="map-legend-item"><span class="legend-dot" style="background:#f59e0b;"></span> Poster</div>
  <div class="map-legend-item"><span class="legend-dot" style="background:#059669;"></span> Workshop / seminar / school</div>
  <div class="map-legend-item"><span class="legend-dot" style="background:#94a3b8;"></span> Upcoming</div>
  <div class="map-legend-item"><span class="legend-dot" style="background:#e11d48;"></span> Personal</div>
</div>

<div id="academic-map"></div>

</div>

<script>
var map, tileLayer;
var darkTile = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
var lightTile = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

var views = {
  all: { center: [20, -10], zoom: 2 },
  europe: { center: [50, 5], zoom: 4 },
  sa: { center: [-33, -68], zoom: 4 },
  santiago: { center: [-33.45, -70.63], zoom: 12 },
  barcelona: { center: [41.38, 2.12], zoom: 13 },
  london: { center: [51.51, -0.13], zoom: 13 }
};

function zoomTo(region) {
  var v = views[region];
  map.flyTo(v.center, v.zoom, { duration: 1.2 });
  document.querySelectorAll('.zoom-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('btn-' + region).classList.add('active');
}

function isDarkMode() {
  var html = document.documentElement;
  if (html.getAttribute('data-theme') === 'dark') return true;
  if (html.classList.contains('dark')) return true;
  if (document.body.getAttribute('data-theme') === 'dark') return true;
  var bg = getComputedStyle(document.body).backgroundColor;
  if (bg) {
    var match = bg.match(/\d+/g);
    if (match && match.length >= 3) {
      var brightness = (parseInt(match[0]) + parseInt(match[1]) + parseInt(match[2])) / 3;
      if (brightness < 128) return true;
    }
  }
  return false;
}

function updateTile() {
  var url = isDarkMode() ? darkTile : lightTile;
  if (tileLayer) tileLayer.setUrl(url);
}

document.addEventListener("DOMContentLoaded", function(){
  var dark = isDarkMode();
  map = L.map('academic-map', { center: [20,-10], zoom: 2, scrollWheelZoom: false, attributionControl: false });
  tileLayer = L.tileLayer(dark ? darkTile : lightTile, { maxZoom: 18 }).addTo(map);

  var observer = new MutationObserver(function(){ updateTile(); });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme','class'] });
  observer.observe(document.body, { attributes: true, attributeFilter: ['data-theme','class'] });

  function ic(c) {
    return L.divIcon({
      className: '',
      html: '<div style="background:'+c+';width:13px;height:13px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>',
      iconSize: [13,13], iconAnchor: [6,6], popupAnchor: [0,-9]
    });
  }

  var U='#2563eb', R='#dc2626', Y='#f59e0b', G='#059669', A='#94a3b8', F='#e11d48';

  var types = {};
  types[U]='University'; types[R]='Talk'; types[Y]='Poster';
  types[G]='Workshop / seminar'; types[A]='Upcoming'; types[F]='Personal';

  var locs = [
    // University / research centre — Chile
    [-33.015, -71.551, U, "Viña del Mar", "Chile", "Hometown"],
    [-33.489, -70.613, U, "UTFSM San Joaquín", "Santiago, Chile", "Pregrado (2016-2020), MSc (2020), TA (2015-2019), Lecturer (2020-2022)"],
    [-33.399, -70.598, U, "UTFSM Vitacura", "Santiago, Chile", "Pregrado (2014-2015), TA (2015-2018), Lecturer (2022)"],
    [-33.498, -70.611, U, "PUC San Joaquín", "Santiago, Chile", "Fourier Analysis (2019), Research internship with Petrache (2019-2020), Working groups (2021-2022)"],
    [-33.458, -70.664, U, "CMM, Universidad de Chile", "Santiago, Chile", "Attended talk by Julio Deride (2022)"],
    [-33.449, -70.683, U, "USACh", "Estación Central, Santiago, Chile", "ENIM 2019"],
    [-33.349, -70.534, U, "Universidad Adolfo Ibáñez", "Peñalolén, Santiago, Chile", "Research visit — Julio Deride (2025-2026)"],
    [-33.047, -71.613, U, "UTFSM Valparaíso", "Valparaíso, Chile", "WOpCoT 2023, OT/MFG Conference 2024, LACIAM 2026"],

    // University / research centre — UK
    [51.499, -0.175, U, "Imperial College London", "London, UK", "PhD Mathematics Research (2023-present)"],
    [51.525, -0.134, U, "UCL Mathematics", "London, UK", "Imperial-UCL Numerics Seminar + NA Workshop 2023"],

    // Conference talks
    [54.775, -1.585, R, "LMS Lecture Series 2023", "Durham, UK", "Optimal Transport lectures by Santambrogio"],
    [48.208, 16.374, R, "16th Viennese Conference on Optimal Control", "Vienna, Austria", "Session talk (2025)"],
    [-29.903, -71.252, R, "Congreso Capricornio 2019", "La Serena, Chile", "PDE session talk"],

    // Poster
    [51.621, -3.944, Y, "Swansea Summer School in Nonlinear PDEs", "Swansea, UK", "Poster presentation (2024)"],

    // Workshops / seminars / schools
    [55.953, -3.188, G, "MAC-MIGS Summer School", "Edinburgh, UK", "Numerical PDEs, Optimization, UQ (2024)"],
    [-32.890, -68.846, G, "SUMA 2019", "Mendoza, Argentina", "Attended as participant"],

    // Upcoming
    [37.984, 23.728, A, "15th AIMS Conference", "Athens, Greece", "July 2026 — Invited talk, SS147"],

    // Personal — FC Barcelona
    [41.3809, 2.1228, F, "Camp Nou", "Barcelona, Spain", "FC Barcelona — home stadium"],
    [41.3649, 2.1527, F, "Estadi Olímpic de Montjuïc", "Barcelona, Spain", "FC Barcelona — temporary home 2023-2025"],
    [41.3816, 2.1168, F, "Palau Blaugrana", "Barcelona, Spain", "FC Barcelona — basketball and handball arena"],
    [41.3534, 2.0741, F, "Ciutat Esportiva Joan Gamper", "Barcelona, Spain", "FC Barcelona — training ground"]
  ];

  locs.forEach(function(d) {
    var badge = '<span style="display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;background:'+d[2]+';margin-bottom:3px;">'+types[d[2]]+'</span>';
    var html = badge+'<br><strong style="font-size:13px;">'+d[3]+'</strong><br><span style="font-size:12px;color:#999;">'+d[4]+'</span>'+(d[5]?'<br><span style="font-size:12px;color:#bbb;">'+d[5]+'</span>':'');
    L.marker([d[0],d[1]], {icon: ic(d[2])}).addTo(map).bindPopup(html, {maxWidth: 220});
  });
});
</script>
